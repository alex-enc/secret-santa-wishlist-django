{% extends 'base.html' %}
{% block body %}
<div class="container">
    <div class="row">
        <div class="col-8 mx-auto">
            <div class="text-center mb-3">
                <h1>Welcome to SecretSanta</h1>
                <h5>Create an account to make gift giving easier this Christmas!</h5>
            </div>
            <form action="{% url 'sign_up'%}" method="post">
                {% csrf_token %}
                {% include 'partials/bootstrap_form.html' with form=form %}
                <div class="text-center">
                    <input type="submit" value="Sign Up" class="btn btn-red">
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
