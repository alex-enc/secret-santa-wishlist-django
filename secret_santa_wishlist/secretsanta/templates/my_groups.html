{% extends 'logged_in_base.html' %}
{% block body %}
<div style="text-align: center;">
    <h1>MY GROUPS</h1>
</div>

<div class="center-cards">
    {% for group in member_groups %}
    <div class="card card-red" style="width: 50rem;">
        <div class="card-body cream-text">
            <h4 class="card-title">{{ group.name }}</h4>
            <h6 class="card-subtitle mb-2">Code: {{ group.code }}</h6>
            <p class="card-text">Members: {{ group.memberships.count }}</p>
        </div>
    </div>
    {% empty %}
    <div class="card card-red cream-text">
        <div class="card-body">
            You aren't in any groups yet.
        </div>
    </div>
    {% endfor %}
    </br>
</div>



{% endblock %}
