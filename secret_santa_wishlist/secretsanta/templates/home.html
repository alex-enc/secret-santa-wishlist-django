{% extends 'base.html' %}
{% block body %}
    <div id="carouselExampleInterval" class="carousel slide christmas-carousel" data-bs-ride="carousel" data-bs-interval="2750">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/static/images/family.png" class="d-block w-100" alt="A family laughing and holding their Christmas presents">
            </div>
            <div class="carousel-item">
                <img src="/static/images/presents.png" class="d-block w-100" alt="Christmas presents">
            </div>
            <div class="carousel-item">
                <img src="/static/images/gift_exchange.png" class="d-block w-100" alt="A woman and a man exchanging Christmas presents">
            </div>
            <div class="carousel-item">
                <img src="/static/images/santa.png" class="d-block w-100" alt="Santa Clause standing in front of the fireplace with a sack filled with presents">
            </div>
            <div class="carousel-item">
                <img src="/static/images/elves.png" class="d-block w-100" alt="Santa's elves sneaking in the house to deliver the presents">
            </div>
        </div>
    </div>
    <div style="justify-content: center; display: flex; text-align: center;">
        <div class="mb-3">
            <h1>Start your Secret Santa group today and share <br>your wishlists with holiday magic!</h1>
        </div>
        <br>
    </div>
    <div style="justify-content: center; display: flex;">
        <div class="mb-3">
            <a href="{% url 'sign_up' %}" class="btn btn-red">SIGN UP</a>
        </div>
    </div>
{% endblock %}
