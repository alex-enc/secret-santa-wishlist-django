{% extends 'base.html' %}
{% block body %}
<div class="container">
    <div class="row mt-3">
        <div class="col-sm-12 col-md-6 offset-md-3">
            <div class="card" style="width: 40rem;">
                <div class="card-body text-center">
                    <h2 class="card-title">Log In</h2>
                    <form action="{% url 'log_in' %}" method="post">
                        {% csrf_token %}
                        {% include 'partials/bootstrap_form.html' with form=form %}
                        {% include 'partials/messages.html' with messages=messages %}
                        <input type="submit" value="Log In" class="btn btn-primary" style="width:18rem;">
                    </form>
                    <div class="mt-3">
                        <p>Don't have an account? Sign Up <span><a href="{% url 'sign_up' %}" class="card-link">Here.</a></span></p>
                        <a href="#">Forgot Password?</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
